{% extends "base.html" %}
{% block title %}Edit {{ defect.id }} | Defect Tracking System{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>Edit <span class="bug-id">{{ defect.id }}</span></h1>
    <div class="subtle">{{ defect.title }}</div>
  </div>
  <a class="btn btn-outline" href="{{ url_for('view', bug_id=defect.id) }}">Back to Details</a>
</section>

<section class="card card-pad">
  <form method="POST" action="{{ url_for('edit', bug_id=defect.id) }}">
    <div class="form-grid">
      <div class="form-group full"><label>Title *</label><input name="title" required maxlength="120" value="{{ defect.title }}"></div>
      <div class="form-group full"><label>Description</label><textarea name="description">{{ defect.description }}</textarea></div>
      <div class="form-group"><label>Module</label><select name="module">{% for item in modules %}<option value="{{ item }}" {% if defect.module == item %}selected{% endif %}>{{ item }}</option>{% endfor %}</select></div>
      <div class="form-group"><label>Severity</label><select name="severity">{% for item in severities %}<option value="{{ item }}" {% if defect.severity == item %}selected{% endif %}>{{ item }}</option>{% endfor %}</select></div>
      <div class="form-group"><label>Priority</label><select name="priority">{% for item in priorities %}<option value="{{ item }}" {% if defect.priority == item %}selected{% endif %}>{{ item }}</option>{% endfor %}</select></div>
      <div class="form-group"><label>Status</label><select name="status">{% for item in statuses %}<option value="{{ item }}" {% if defect.status == item %}selected{% endif %}>{{ item }}</option>{% endfor %}</select></div>
      <div class="form-group"><label>Assigned To</label><input name="assigned_to" value="{{ defect.assigned_to }}"></div>
      <div class="form-group"><label>Reported By</label><input name="reported_by" value="{{ defect.reported_by }}"></div>
      <div class="form-group full"><label>Steps to Reproduce</label><textarea name="steps_to_reproduce">{{ defect.steps_to_reproduce }}</textarea></div>
      <div class="form-group"><label>Expected Result</label><textarea name="expected_result">{{ defect.expected_result }}</textarea></div>
      <div class="form-group"><label>Actual Result</label><textarea name="actual_result">{{ defect.actual_result }}</textarea></div>
      <div class="form-group full"><label>Comments / Notes</label><textarea name="comments">{{ defect.comments }}</textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Save Changes</button>
      <a class="btn btn-outline" href="{{ url_for('view', bug_id=defect.id) }}">Cancel</a>
    </div>
  </form>
  <form method="POST" action="{{ url_for('delete', bug_id=defect.id) }}" onsubmit="return confirm('Delete {{ defect.id }}?');" style="margin-top:14px">
    <button class="btn btn-danger" type="submit">Delete Defect</button>
  </form>
</section>
{% endblock %}
